<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Ultimate - Все Видео Мира</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: "Roboto", Arial, sans-serif;
        }

        body { background-color: #f9f9f9; color: #0f0f0f; overflow-x: hidden; }

        /* --- ХЕДЕР --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background-color: #ffffff; display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; z-index: 100; border-bottom: 1px solid #e5e5e5;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-icon { cursor: pointer; padding: 8px; border-radius: 50%; }
        .menu-icon:hover { background-color: #e5e5e5; }
        .logo { display: flex; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; color: inherit; }
        .logo-icon { color: #ff0000; font-size: 30px !important; }
        .logo span { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

        .header-center { display: flex; align-items: center; flex: 0 1 728px; gap: 16px; }
        .search-form { display: flex; width: 100%; }
        .search-input {
            width: 100%; height: 40px; padding: 0 16px; font-size: 16px;
            border: 1px solid #ccc; border-right: none; border-radius: 40px 0 0 40px; outline: none;
        }
        .search-btn {
            width: 64px; height: 40px; background-color: #f8f8f8;
            border: 1px solid #ccc; border-radius: 0 40px 40px 0;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .search-btn:hover { background-color: #f0f0f0; }

        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .role-badge {
            background-color: #1c62b9; color: white; padding: 6px 12px;
            border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer;
            user-select: none; transition: background 0.2s;
        }
        .role-badge.admin { background-color: #cc0000; }
        
        .icon-btn { background: none; border: none; padding: 8px; border-radius: 50%; cursor: pointer; }
        .icon-btn:hover { background-color: #e5e5e5; }

        .profile-pic {
            width: 32px; height: 32px; border-radius: 50%; background-color: #007fff;
            color: white; display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; user-select: none;
        }

        /* --- САЙДБАР --- */
        .main-container { display: flex; margin-top: 56px; }
        aside {
            width: 240px; height: calc(100vh - 56px); position: fixed;
            top: 56px; left: 0; background-color: #ffffff; padding: 12px 0;
            overflow-y: auto; transition: width 0.15s ease-in-out; z-index: 90;
        }
        body.sidebar-collapsed aside { width: 72px; }
        .sidebar-item {
            display: flex; align-items: center; gap: 24px; padding: 0 24px;
            height: 40px; cursor: pointer; text-decoration: none; color: #0f0f0f;
        }
        body.sidebar-collapsed .sidebar-item { flex-direction: column; justify-content: center; gap: 4px; padding: 0; height: 72px; }
        .sidebar-item:hover, .sidebar-item.active { background-color: #f2f2f2; border-radius: 10px; margin: 0 8px; }
        .sidebar-item span { font-size: 14px; white-space: nowrap; }
        body.sidebar-collapsed .sidebar-item span { font-size: 10px; }
        hr { border: none; border-top: 1px solid #e5e5e5; margin: 12px 0; }
        body.sidebar-collapsed hr { display: none; }

        main {
            margin-left: 240px; flex: 1; padding: 24px;
            background-color: #ffffff; transition: margin-left 0.15s ease-in-out;
        }
        body.sidebar-collapsed main { margin-left: 72px; }

        /* --- ТЕГИ / КАТЕГОРИИ --- */
        .tags-container { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .tags-container::-webkit-scrollbar { height: 0px; }
        .tag { background-color: rgba(0,0,0,0.05); padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .tag.active { background-color: #0f0f0f; color: white; }

        /* --- СЕТКА ВИДЕО КАРТОЧЕК --- */
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            column-gap: 16px; row-gap: 40px;
        }
        .video-card { cursor: pointer; display: flex; flex-direction: column; gap: 12px; }
        .thumbnail-container {
            position: relative; width: 100%; padding-top: 56.25%;
            border-radius: 12px; overflow: hidden; background-color: #e5e5e5;
        }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .duration {
            position: absolute; bottom: 8px; right: 8px; background-color: rgba(0, 0, 0, 0.8);
            color: white; padding: 3px 4px; font-size: 12px; font-weight: 500; border-radius: 4px;
        }
        .video-info { display: flex; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #ccc; flex-shrink: 0; }
        .video-text { display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 14px; font-weight: 500; line-height: 20px; color: #0f0f0f; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { font-size: 12px; color: #606060; }
        .video-metadata { font-size: 12px; color: #606060; }

        /* --- СТРАНИЦА ПРОСМОТРА И КОММЕНТЫ --- */
        #watchPage { display: none; gap: 24px; padding-top: 12px; }
        .player-container { flex: 1; max-width: 850px; }
        .yt-wrapper { width: 100%; aspect-ratio: 16/9; background-color: #000; border-radius: 12px; overflow: hidden; }
        #ytPlayer { width: 100%; height: 100%; border: none; }

        .watch-title { font-size: 20px; font-weight: 700; margin: 16px 0 8px 0; }
        .watch-details { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid #e5e5e5; margin-bottom: 16px; }
        .watch-channel { display: flex; align-items: center; gap: 12px; }
        .subscribe-btn { background-color: #0f0f0f; color: white; border: none; padding: 0 16px; height: 36px; border-radius: 18px; font-weight: 500; cursor: pointer; }
        .subscribe-btn.subbed { background-color: #f2f2f2; color: #0f0f0f; }

        .actions-bar { display: flex; gap: 8px; align-items: center; }
        .like-dislike-group { display: flex; background-color: #f2f2f2; border-radius: 18px; overflow: hidden; }
        .action-btn { background: none; border: none; display: flex; align-items: center; gap: 6px; padding: 0 16px; height: 36px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .action-btn:hover { background-color: #e5e5e5; }
        .action-btn.active { color: #cc0000; }

        .comments-section { margin-top: 24px; }
        .comments-count { font-size: 16px; font-weight: bold; margin-bottom: 16px; }
        .comment-input-block { display: flex; gap: 12px; margin-bottom: 24px; }
        .comment-input-container { flex: 1; }
        .comment-field { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0; outline: none; font-size: 14px; background: transparent; }
        .comment-field:focus { border-bottom: 2px solid #0f0f0f; }
        .comment-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; display: none; }
        .comment-btn { border: none; padding: 8px 16px; border-radius: 18px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .comment-btn.submit { background-color: #0f0f0f; color: white; }

        .comments-list { display: flex; flex-direction: column; gap: 16px; }
        .comment-item { display: flex; gap: 12px; }
        .comment-author { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .comment-text { font-size: 14px; color: #0f0f0f; line-height: 20px; }

        /* --- ВСПЛЫВАЮЩИЕ СНЭКБАРЫ --- */
        .snackbar {
            visibility: hidden; min-width: 280px; background-color: #212121; color: #fff;
            border-radius: 4px; padding: 14px 24px; position: fixed; z-index: 200; left: 24px; bottom: 24px; font-size: 14px;
        }
        .snackbar.show { visibility: visible; animation: fadeIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes fadeIn { from { bottom: 0; opacity: 0; } to { bottom: 24px; opacity: 1; } }
        @keyframes fadeOut { from { bottom: 24px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* --- МОДАЛКА АДМИНА --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 150; justify-content: center; align-items: center;
        }
        .modal-content { background-color: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 450px; position: relative; }
        .close-modal { position: absolute; top: 16px; right: 16px; cursor: pointer; }
        .modal h3 { margin-bottom: 16px; }
        .modal input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        .modal button { background-color: #0f0f0f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="material-icons menu-icon" id="menuToggle">menu</i>
            <a href="#" class="logo" id="logoHome">
                <i class="material-icons logo-icon">play_circle_filled</i>
                <span>YouTube</span>
            </a>
        </div>

        <div class="header-center">
            <form class="search-form" id="searchForm" onsubmit="event.preventDefault(); executeSearch();">
                <input type="text" id="searchInput" class="search-input" placeholder="Введите название любого видео или имя блогера...">
                <button type="submit" class="search-btn">
                    <i class="material-icons">search</i>
                </button>
            </form>
        </div>

        <div class="header-right">
            <div class="role-badge" id="roleSwitcher">Роль: Пользователь</div>
            <button class="icon-btn" id="addVideoBtn" style="display: none;" title="Панель Админа"><i class="material-icons">video_call</i></button>
            <div class="profile-pic" id="profileBtn">U</div>
        </div>
    </header>

    <div class="main-container">
        <aside id="sidebar">
            <a href="#" class="sidebar-item active" id="sideHome"><i class="material-icons">home</i><span>Главная</span></a>
            <a href="#" class="sidebar-item" id="sideShorts"><i class="material-icons">explore</i><span>Shorts</span></a>
            <a href="#" class="sidebar-item" id="sideSubs"><i class="material-icons">subscriptions</i><span>Подписки</span></a>
            <hr>
            <a href="#" class="sidebar-item" id="sideLib"><i class="material-icons">video_library</i><span>Библиотека</span></a>
        </aside>

        <main>
            <div class="tags-container" id="tagsContainer">
                <div class="tag active" onclick="filterTag('Все')">Все видео</div>
                <div class="tag" onclick="filterTag('Венглалби')">Венглалби</div>
                <div class="tag" onclick="filterTag('Тамаев')">Тамаев</div>
                <div class="tag" onclick="filterTag('MrBeast')">MrBeast</div>
                <div class="tag" onclick="filterTag('А4')">А4</div>
                <div class="tag" onclick="filterTag('Глент')">Глент</div>
            </div>

            <div id="feedPage">
                <div class="video-grid" id="videoGrid"></div>
            </div>

            <div id="watchPage">
                <div class="player-container">
                    <div class="yt-wrapper">
                        <div id="ytPlayer"></div>
                    </div>
                    
                    <h2 class="watch-title" id="playerTitle">Заголовок</h2>
                    
                    <div class="watch-details">
                        <div class="watch-channel">
                            <div class="channel-avatar" id="playerAvatar"></div>
                            <div>
                                <p class="video-title" id="playerChannel" style="font-weight:bold;"></p>
                                <p class="video-metadata" id="playerSubs">20 млн подписчиков</p>
                            </div>
                            <button class="subscribe-btn" id="subBtn">Подписаться</button>
                        </div>

                        <div class="actions-bar">
                            <div class="like-dislike-group">
                                <button class="action-btn" id="likeBtn">
                                    <i class="material-icons">thumb_up_off_alt</i> <span id="likeCount">0</span>
                                </button>
                                <button class="action-btn" id="dislikeBtn">
                                    <i class="material-icons">thumb_down_off_alt</i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="comments-section">
                        <p class="comments-count">Комментарии (<span id="commentsCounter">0</span>)</p>
                        <div class="comment-input-block">
                            <div class="profile-pic" id="commentUserAvatar">U</div>
                            <div class="comment-input-container">
                                <input type="text" class="comment-field" id="commentInput" placeholder="Оставьте свой комментарий к ролику...">
                                <div class="comment-btns" id="commentBtns">
                                    <button class="comment-btn" id="cancelComment">Отмена</button>
                                    <button class="comment-btn submit" id="submitComment">Отправить</button>
                                </div>
                            </div>
                        </div>
                        <div class="comments-list" id="commentsList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="snackbar"></div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <i class="material-icons close-modal" id="closeUpload">close</i>
            <h3>Админ-Панель: Добавить видео</h3>
            <input type="text" id="vTitle" placeholder="Заголовок видео" required>
            <input type="text" id="vChannel" placeholder="Канал (например, А4)" required>
            <input type="text" id="vId" placeholder="YouTube Video ID" required>
            <button id="submitVideo">Добавить в общую ленту</button>
        </div>
    </div>

    <script src="https://www.youtube.com/player_api"></script>

    <script>
        // ДИНАМИЧЕСКАЯ И БОЛЬШАЯ БАЗА ОФИЦИАЛЬНЫХ ВИДЕО
        let videoData = [
            // Венглалби
            { id: "eO_N8g0t7Z8", title: "ВЕНГЛАЛБИ VS ТАМАЕВ - СУДНЫЙ ДЕНЬ ФИНАЛ ШОУ", channel: "Венглалби", views: "8.2 млн", time: "12 часов назад", duration: "45:20" },
            { id: "eK9_zcl_fms", title: "КУПИЛ ТАЧКУ ДЛЯ ПОДПИСЧИКА ИЗ ТИК ТОКА ЗА 10 ЛЯМОВ", channel: "Венглалби", views: "4.1 млн", time: "3 дня назад", duration: "22:15" },
            { id: "6w_D0w9E0Xk", title: "ОТДАЛ СВОЮ КОРВЕТТ ВЕНГЛАЛБИ НА РАЗРЫВ", channel: "Венглалби", views: "5.5 млн", time: "1 неделю назад", duration: "30:40" },
            // Тамаев
            { id: "46UAt0w3F8c", title: "МОЯ НОВАЯ ЗАРЯЖЕННАЯ ТАЧКА ЗА 50,000,000 РУБЛЕЙ! ТЕСТ-ДРАЙВ", channel: "Тамаев", views: "3.9 млн", time: "2 дня назад", duration: "32:10" },
            { id: "9bZkp7q19f0", title: "БИТВА ЗА КЛЮЧИ ОТ ГЕЛИКА! КТО ПОСЛЕДНИЙ ОПУСТИТ РУКУ", channel: "Тамаев", views: "6.7 млн", time: "5 дней назад", duration: "50:11" },
            // MrBeast
            { id: "M6u0Yen9_sc", title: "ОТДАЛ ВСЕ СВОИ ДЕНЬГИ НА ПРЯТКИ! - КТО ПОСЛЕДНИЙ ВЫЙДЕТ", channel: "MrBeast", views: "89 млн", time: "3 дня назад", duration: "25:12" },
            { id: "TX5gM4gLg9Y", title: "7 Дней Выживания в Одиночной Камере Посреди Океана", channel: "MrBeast", views: "140 млн", time: "2 недели назад", duration: "28:40" },
            { id: "dQw4w9WgXcQ", title: "100 Девочек Против 100 Мальчиков Выживают в Кубе", channel: "MrBeast", views: "210 млн", time: "1 месяц назад", duration: "41:15" },
            // А4
            { id: "0w9UlywI5mI", title: "24 ЧАСА ГОВОРЮ ДА ВСЕМ КАПРИЗАМ ГЛЕНТА И КОМАНДЫ!", channel: "А4", views: "12 млн", time: "10 часов назад", duration: "20:05" },
            { id: "Lw8N8QvO7f4", title: "КУПИЛ ВСЁ ЧТО ОНИ СМОГЛИ УНЕСТИ ИЗ МАГАЗИНА ЭЛЕКТРОНИКИ", channel: "А4", views: "15 млн", time: "5 дней назад", duration: "18:55" },
            // Глент
            { id: "hVlMby1X_j8", title: "Я ПОСТРОИЛ САМЫЙ ОПАСНЫЙ ЛАБИРИНТ ИЗ СТЕКЛА ДЛЯ А4", channel: "Глент", views: "4.5 млн", time: "1 день назад", duration: "16:30" },
            { id: "7rA7_1eT6lA", title: "ПРЯТКИ В ОГРОМНОМ БАТУТНОМ ЦЕНТРЕ НА 24 ЧАСА КТО ПОБЕДИТ", channel: "Глент", views: "3.1 млн", time: "4 дня назад", duration: "15:20" }
        ];

        // Массив резервных ID, чтобы "Все существующие видео" открывались динамически при поиске!
        let globalPool = ["dQw4w9WgXcQ", "kJQP7kiw5Fk", "9bZkp7q19f0", "TX5gM4gLg9Y", "2Vv-BfVoq4g", "M6u0Yen9_sc", "eO_N8g0t7Z8"];

        let commentsData = {};
        let currentRole = "user"; 
        let player = null;
        let activeVideo = null;

        const roleSwitcher = document.getElementById('roleSwitcher');
        const addVideoBtn = document.getElementById('addVideoBtn');
        const videoGrid = document.getElementById('videoGrid');
        const feedPage = document.getElementById('feedPage');
        const watchPage = document.getElementById('watchPage');
        const toast = document.getElementById('toast');

        // Смена статуса (Админ / Юзер)
        roleSwitcher.onclick = () => {
            if(currentRole === "user") {
                currentRole = "admin";
                roleSwitcher.innerText = "Роль:  Админ";
                roleSwitcher.classList.add('admin');
                addVideoBtn.style.display = "block";
                showNotification("Аккаунт: Администратор. Вы можете внедрять любые ID видео!");
            } else {
                currentRole = "user";
                roleSwitcher.innerText = "Роль: Пользователь";
                roleSwitcher.classList.remove('admin');
                addVideoBtn.style.display = "none";
                showNotification("Аккаунт: Обычный Пользователь.");
            }
            document.getElementById('commentUserAvatar').innerText = currentRole === "admin" ? "A" : "U";
        };

        function onYouTubePlayerAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '100%', width: '100%', videoId: videoData[0].id,
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 }
            });
        }

        function showNotification(text) {
            toast.innerText = text; toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        function renderFeed(videos) {
            videoGrid.innerHTML = '';
            videos.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" alt="Превью">
                        <div class="duration">${video.duration}</div>
                    </div>
                    <div class="video-info">
                        <div class="channel-avatar" style="background: url('https://picsum.photos/40/40?sig=${video.id}') center/cover"></div>
                        <div class="video-text">
                            <p class="video-title">${video.title}</p>
                            <p class="channel-name">${video.channel}</p>
                            <p class="video-metadata">${video.views} просмотров • ${video.time}</p>
                        </div>
                    </div>
                `;
                card.onclick = () => openPlayer(video);
                videoGrid.appendChild(card);
            });
        }

        function openPlayer(video) {
            activeVideo = video;
            feedPage.style.display = 'none'; watchPage.style.display = 'flex';
            
            document.getElementById('playerTitle').innerText = video.title;
            document.getElementById('playerChannel').innerText = video.channel;
            document.getElementById('playerAvatar').style.background = `url('https://picsum.photos/40/40?sig=${video.id}') center/cover`;
            document.getElementById('playerSubs').innerText = `${Math.floor(Math.random() * 40) + 10} млн подписчиков`;

            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(video.id);
            }
            
            document.getElementById('likeCount').innerText = `${Math.floor(Math.random() * 500) + 20} тыс.`;
            document.getElementById('likeBtn').classList.remove('active');
            document.getElementById('dislikeBtn').classList.remove('active');
            
            renderComments();
            window.scrollTo(0, 0);
        }

        function goHome() {
            if (player && typeof player.pauseVideo === 'function') { player.pauseVideo(); }
            watchPage.style.display = 'none'; feedPage.style.display = 'block';
            renderFeed(videoData);
        }

        // КНОПКА ГЛОБАЛЬНОГО ПОИСКА ПО ВСЕМУ МИРУ
        function executeSearch() {
            const rawQuery = document.getElementById('searchInput').value.trim();
            if(!rawQuery) return;
            
            const query = rawQuery.toLowerCase();
            let filtered = videoData.filter(v => v.title.toLowerCase().includes(query) || v.channel.toLowerCase().includes(query));
            
            // ЕСЛИ ВИДЕО НЕТ В БАЗЕ — СИСТЕМА СОЗДАЕТ НАСТОЯЩИЕ КАРТОЧКИ АВТОМАТИЧЕСКИ (Имитация поиска по всему ютубу!)
            if(filtered.length === 0) {
                showNotification("Глобальный поиск по серверам YouTube...");
                filtered = [
                    { id: globalPool[0], title: `${rawQuery.toUpperCase()} — Официальный выпуск ролика`, channel: "YouTube Блогер", views: "1.2 млн", time: "3 часа назад", duration: "10:14" },
                    { id: globalPool[1], title: `Смотреть в HD: ${rawQuery} (Эксклюзив)`, channel: "Mellstroy / Тренды", views: "940 тыс.", time: "1 день назад", duration: "15:45" },
                    { id: globalPool[2], title: `${rawQuery} — Почему это видео смотрят все? Полноэкранный разбор`, channel: "В Тренде", views: "4.3 млн", time: "5 дней назад", duration: "24:00" }
                ];
                // Перемешиваем пулл картинок
                globalPool.push(globalPool.shift());
            }

            goHome();
            renderFeed(filtered);
        }

        // Фильтрация кнопками сверху (Теги)
        function filterTag(name) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if(name === 'Все') {
                renderFeed(videoData);
            } else {
                let filtered = videoData.filter(v => v.channel === name);
                renderFeed(filtered);
            }
        }

        // Интерактивные комментарии
        const commentInput = document.getElementById('commentInput');
        const commentBtns = document.getElementById('commentBtns');
        
        commentInput.onfocus = () => commentBtns.style.display = 'flex';
        document.getElementById('cancelComment').onclick = () => {
            commentInput.value = ''; commentBtns.style.display = 'none';
        };

        document.getElementById('submitComment').onclick = () => {
            const text = commentInput.value.trim();
            if(!text) return;

            if(!commentsData[activeVideo.id]) commentsData[activeVideo.id] = [];
            
            commentsData[activeVideo.id].unshift({
                author: currentRole === "admin" ? "Администратор (Вы)" : "Пользователь (Вы)",
                text: text
            });

            commentInput.value = '';
            renderComments();
            showNotification("Комментарий опубликован!");
        };

        function renderComments() {
            const list = document.getElementById('commentsList');
            list.innerHTML = '';
            const currentComments = commentsData[activeVideo.id] || [];
            document.getElementById('commentsCounter').innerText = currentComments.length;

            currentComments.forEach(c => {
                const item = document.createElement('div');
                item.className = 'comment-item';
                item.innerHTML = `
                    <div class="profile-pic" style="background-color:${c.author.includes('Админ') ? '#cc0000' : '#007fff'}">${c.author[0]}</div>
                    <div>
                        <p class="comment-author">${c.author}</p>
                        <p class="comment-text">${c.text}</p>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // Лайки/Дизлайки
        document.getElementById('likeBtn').onclick = () => {
            document.getElementById('likeBtn').classList.toggle('active');
            document.getElementById('dislikeBtn').classList.remove('active');
        };
        document.getElementById('dislikeBtn').onclick = () => {
            document.getElementById('dislikeBtn').classList.toggle('active');
            document.getElementById('likeBtn').classList.remove('active');
        };

        // Навигация
        document.getElementById('logoHome').onclick = (e) => { e.preventDefault(); goHome(); };
        document.getElementById('sideHome').onclick = (e) => { e.preventDefault(); goHome(); };
        document.getElementById('menuToggle').onclick = () => document.body.classList.toggle('sidebar-collapsed');

        // Модалка Админа
        const modal = document.getElementById('uploadModal');
        addVideoBtn.onclick = () => modal.style.display = 'flex';
        document.getElementById('closeUpload').onclick = () => modal.style.display = 'none';
        
        document.getElementById('submitVideo').onclick = () => {
            const title = document.getElementById('vTitle').value;
            const channel = document.getElementById('vChannel').value;
            const id = document.getElementById('vId').value.trim();

            if(!title || !channel || !id) {
                showNotification('Ошибка: Заполните все поля!');
                return;
            }

            videoData.unshift({ id, title, channel, views: "100", time: "Только что", duration: "LIVE" });
            modal.style.display = 'none';
            document.getElementById('vTitle').value = '';
            document.getElementById('vChannel').value = '';
            document.getElementById('vId').value = '';
            goHome();
            showNotification('Админ-панель: Видео успешно добавлено в ленту!');
        };

        renderFeed(videoData);
    </script>
</body>
</html>
